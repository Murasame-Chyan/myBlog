<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>归档页面</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/css/common.css">
</head>
<body>
    <header th:replace="~{fragment/header :: nav('archives')}"></header>

    <main class="container-fluid my-4">
        <div class="row main-container">
            <aside class="col-lg-2 col-md-3 mb-4">
                <div class="sidebar-left">
                    <div class="sidebar-section">
                        <h6 class="sidebar-title">
                            <i class="bi bi-tags"></i> 标签
                        </h6>
                        <input type="text" class="tag-search-input" id="tagSearch" placeholder="搜索标签..."
                               oninput="filterTags()">
                        <div class="tags-cloud" id="tagsCloud">
                            <a th:each="tag : ${allTags}" th:href="@{/archives/tag/{id}(id=${tag.id})}"
                               class="tag-badge"
                               th:class="${selectedTagId != null and selectedTagId == tag.id ? 'tag-badge active' : 'tag-badge'}"
                               th:text="${tag.tagName}">标签</a>
                        </div>
                        <div class="tag-limit-hint" id="tagLimitHint"></div>
                    </div>
                </div>
            </aside>

            <div class="col-lg-8 col-md-6 mb-4">
                <div class="alert alert-info mb-3">
                    <i class="bi bi-info-circle"></i> 此处展示已删除的文章，仅支持阅读，不支持评论。
                </div>

                <h5 class="mb-3">已归档文章</h5>

                <div class="card shadow-sm mb-3 card-clickable" th:each="a : ${archiveBrief}" th:attr="data-href=@{/archives/read/{id}(id=${a.id})}">
                    <div class="card-body">
                        <h5 class="card-title mb-2">
                            <a th:href="@{/archives/read/{id}(id=${a.id})}" th:text="${a.title}">标题</a>
                        </h5>
                        
                        <p class="card-text text-muted small mb-3"
                           th:text="${a.brief}+'...'">摘要...</p>
                        
                        <div class="blog-meta">
                            <span class="meta-item">
                                <a th:href="@{/user/profile(id=${a.u_id})}" class="author-link">
                                    <img th:src="${a.author_avatar != null ? a.author_avatar : '/images/default-avatar.png'}"
                                         class="author-avatar-mini" alt="" style="width:22px;height:22px;object-fit:cover;">
                                    <span th:text="${a.author}">作者</span>
                                </a>
                            </span>
                            <span class="meta-item">
                                <i class="bi bi-calendar"></i>
                                <span th:text="${#temporals.format(a.created_at,'yyyy/MM/dd HH:mm')}">2025-12-03 17:00</span>
                            </span>
                        </div>

                        <div class="blog-tags" th:if="${a.t_id != null and a.t_id.tagList != null and !a.t_id.tagList.isEmpty()}">
                            <th:block th:each="tagId : ${a.t_id.tagList}">
                                <span th:each="tag : ${allTags}" th:if="${tag.id == tagId}" class="blog-tag" th:text="${tag.tagName}">标签</span>
                            </th:block>
                        </div>
                    </div>
                    </div>
                </div>

                <div th:if="${totalPages > 1}" class="pagination-container mb-3">
                    <nav aria-label="归档分页">
                        <ul class="pagination justify-content-center">
                            <li class="page-item" th:classappend="${currentPage == 1 ? 'disabled' : ''}">
                                <a class="page-link" th:href="@{/archives(page=1)}" title="首页">
                                    <span aria-hidden="true">&laquo;&laquo;</span>
                                </a>
                            </li>
                            
                            <li class="page-item" th:classappend="${currentPage == 1 ? 'disabled' : ''}">
                                <a class="page-link" th:href="@{/archives(page=${currentPage - 1})}" title="上一页">
                                    <span aria-hidden="true">&laquo;</span>
                                </a>
                            </li>
                            
                            <th:block th:if="${totalPages <= 7}">
                                <li class="page-item" th:each="pageNum : ${#numbers.sequence(1, totalPages)}" 
                                    th:classappend="${pageNum == currentPage ? 'active' : ''}">
                                    <a class="page-link" th:href="@{/archives(page=${pageNum})}" th:text="${pageNum}">1</a>
                                </li>
                            </th:block>
                            
                            <th:block th:if="${totalPages > 7}">
                                <li class="page-item" th:classappend="${currentPage == 1 ? 'active' : ''}">
                                    <a class="page-link" th:href="@{/archives(page=1)}">1</a>
                                </li>
                                
                                <li class="page-item disabled" th:if="${currentPage > 4}">
                                    <span class="page-link">...</span>
                                </li>
                                
                                <th:block th:with="startPage=${T(java.lang.Math).max(2, currentPage - 2)}, 
                                                 endPage=${T(java.lang.Math).min(totalPages - 1, currentPage + 2)}">
                                    <li class="page-item" th:each="pageNum : ${#numbers.sequence(startPage, endPage)}" 
                                        th:classappend="${pageNum == currentPage ? 'active' : ''}">
                                        <a class="page-link" th:href="@{/archives(page=${pageNum})}" th:text="${pageNum}">5</a>
                                    </li>
                                </th:block>
                                
                                <li class="page-item disabled" th:if="${currentPage < totalPages - 3}">
                                    <span class="page-link">...</span>
                                </li>
                                
                                <li class="page-item" th:classappend="${currentPage == totalPages ? 'active' : ''}">
                                    <a class="page-link" th:href="@{/archives(page=${totalPages})}" th:text="${totalPages}">100</a>
                                </li>
                            </th:block>
                            
                            <li class="page-item" th:classappend="${currentPage == totalPages ? 'disabled' : ''}">
                                <a class="page-link" th:href="@{/archives(page=${currentPage + 1})}" title="下一页">
                                    <span aria-hidden="true">&raquo;</span>
                                </a>
                            </li>
                            
                            <li class="page-item" th:classappend="${currentPage == totalPages ? 'disabled' : ''}">
                                <a class="page-link" th:href="@{/archives(page=${totalPages})}" title="末页">
                                    <span aria-hidden="true">&raquo;&raquo;</span>
                                </a>
                            </li>
                        </ul>
                    </nav>
                    
                    <div class="quick-jump text-center mt-2">
                        <span class="text-muted small">跳转到</span>
                        <form th:action="@{/archives}" method="get" class="d-inline-block mx-2">
                            <input type="number" name="page" min="1" th:max="${totalPages}" 
                                   class="form-control d-inline-block" style="width: 70px; display: inline-block;"
                                   placeholder="页码" required>
                            <span class="text-muted small">/ <span th:text="${totalPages}">100</span> 页</span>
                            <button type="submit" class="btn btn-sm btn-outline-primary ms-2">跳转</button>
                        </form>
                    </div>
                </div>

                <div th:if="${totalArchives == 0}" class="alert alert-info">
                    归档为空，暂无已删除的文章~ 御坂网路支持中...
                </div>
                <div th:if="${totalArchives > 0}" class="alert alert-info">
                    已归档 <span th:text="${totalArchives}"></span> 篇文章~ 御坂网路支持中...
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.querySelectorAll('.card-clickable').forEach(function(card) {
            card.addEventListener('click', function(e) {
                if (e.target.closest('a, button, input, .tag-chip, .bi-x')) return;
                var href = card.getAttribute('data-href');
                if (href) window.location = href;
            });
        });

        // 标签搜索与限制显示
        var MAX_TAGS = 10;
        function filterTags() {
            var searchTerm = document.getElementById('tagSearch').value.toLowerCase();
            var badges = document.querySelectorAll('#tagsCloud .tag-badge');
            var visibleCount = 0;
            badges.forEach(function(badge) {
                var match = badge.textContent.toLowerCase().includes(searchTerm);
                if (match && visibleCount < MAX_TAGS) {
                    badge.style.display = '';
                    visibleCount++;
                } else {
                    badge.style.display = 'none';
                }
            });
            var hint = document.getElementById('tagLimitHint');
            var total = badges.length;
            var filtered = document.querySelectorAll('#tagsCloud .tag-badge[style*="display: none"]').length;
            var shown = total - filtered;
            if (total > MAX_TAGS && !searchTerm) {
                hint.textContent = '显示前 ' + MAX_TAGS + ' 个，共 ' + total + ' 个，请搜索以查找更多';
            } else if (searchTerm) {
                hint.textContent = '找到 ' + shown + ' 个匹配的标签';
            } else {
                hint.textContent = '';
            }
        }
        filterTags();
    </script>
<footer th:replace="~{fragment/footer :: footer}"></footer>
<div th:replace="~{fragment/musicPlayer :: musicPlayer}"></div>
</body>
</html>
