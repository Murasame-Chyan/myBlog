<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>博客主页</title>
    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/css/common.css">
    <link rel="stylesheet" href="/css/weather.css">
</head>
<body>
    <!-- 1.header -->
    <header th:replace="~{fragment/header :: nav('index')}"></header>

    <!-- 2.blogList -->
    <main class="container my-4">
        <div class="row">
            <!-- 左侧栏 -->
            <aside class="col-lg-3 col-md-4 mb-4">
                <div class="sidebar-left">
                    <div class="sidebar-section">
                        <div th:replace="~{fragment/weather :: weather}"></div>
                    </div>

                    <div class="sidebar-section mt-4">
                        <h6 class="sidebar-title">
                            <i class="bi bi-tags"></i> 标签
                        </h6>
                        <div class="tags-cloud">
                            <a th:each="tag : ${allTags}" th:href="@{/blogs/tag/{id}(id=${tag.id})}" 
                               class="tag-badge"
                               th:class="${selectedTagId != null and selectedTagId == tag.id ? 'tag-badge active' : 'tag-badge'}"
                               th:text="${tag.tagName}">标签</a>
                        </div>
                    </div>
                </div>
            </aside>

            <!-- 中间内容 -->
            <div class="col-lg-6 col-md-8 mb-4">
                <h5 class="mb-3">最新文章</h5>

                <div class="card shadow-sm mb-3" th:each="b : ${blogBrief}">
                    <div class="card-body">
                        <!-- 标题 -->
                        <h5 class="card-title mb-2">
                            <a th:href="@{/blogs/read/{id}(id=${b.id})}" th:text="${b.title}">标题</a>
                        </h5>
                        
                        <!-- 摘要 -->
                        <p class="card-text text-muted small mb-3"
                           th:text="${b.brief}+'...'">摘要...</p>
                        
                        <!-- 元信息 -->
                        <div class="blog-meta">
                            <span class="meta-item">
                                <i class="bi bi-eye"></i>
                                <span th:text="${b.read_count != null ? b.read_count : 0}">0</span>
                            </span>
                            <span class="meta-item">
                                <i class="bi bi-hand-thumbs-up"></i>
                                <span th:text="${b.like_count != null ? b.like_count : 0}">0</span>
                            </span>
                            <span class="meta-item">
                                <i class="bi bi-chat"></i>
                                <span th:text="${b.comment_count != null ? b.comment_count : 0}">0</span>
                            </span>
                            <span class="meta-item">
                                <i class="bi bi-person"></i>
                                <span th:text="${b.author}">作者</span>
                            </span>
                            <span class="meta-item">
                                <i class="bi bi-calendar"></i>
                                <span th:text="${#temporals.format(b.created_at,'yyyy/MM/dd HH:mm')}">2025-12-03 17:00</span>
                            </span>
                        </div>

                        <div class="blog-tags" th:if="${b.t_id != null and b.t_id.tagList != null and !b.t_id.tagList.isEmpty()}">
                            <span class="me-2"><strong>标签：</strong></span>
                            <th:block th:each="tagId : ${b.t_id.tagList}">
                                <span th:each="tag : ${allTags}" th:if="${tag.id == tagId}" class="blog-tag" th:text="${tag.tagName}">标签</span>
                            </th:block>
                        </div>

                    </div>
                </div>

                <!-- 分页控件 -->
                <div th:if="${totalPages > 1}" class="pagination-container mb-3">
                    <nav aria-label="博客分页">
                        <ul class="pagination justify-content-center">
                            <!-- 首页 -->
                            <li class="page-item" th:classappend="${currentPage == 1 ? 'disabled' : ''}">
                                <a class="page-link" th:href="@{/(page=1)}" title="首页">
                                    <span aria-hidden="true">&laquo;&laquo;</span>
                                </a>
                            </li>
                            
                            <!-- 上一页 -->
                            <li class="page-item" th:classappend="${currentPage == 1 ? 'disabled' : ''}">
                                <a class="page-link" th:href="@{/(page=${currentPage - 1})}" title="上一页">
                                    <span aria-hidden="true">&laquo;</span>
                                </a>
                            </li>
                            
                            <!-- 页码显示逻辑 -->
                            <th:block th:if="${totalPages <= 7}">
                                <!-- 页数少，全部显示 -->
                                <li class="page-item" th:each="pageNum : ${#numbers.sequence(1, totalPages)}" 
                                    th:classappend="${pageNum == currentPage ? 'active' : ''}">
                                    <a class="page-link" th:href="@{/(page=${pageNum})}" th:text="${pageNum}">1</a>
                                </li>
                            </th:block>
                            
                            <th:block th:if="${totalPages > 7}">
                                <!-- 页数多，智能显示 -->
                                <!-- 总是显示第1页 -->
                                <li class="page-item" th:classappend="${currentPage == 1 ? 'active' : ''}">
                                    <a class="page-link" th:href="@{/(page=1)}">1</a>
                                </li>
                                
                                <!-- 前省略号 -->
                                <li class="page-item disabled" th:if="${currentPage > 4}">
                                    <span class="page-link">...</span>
                                </li>
                                
                                <!-- 当前页附近的页码 -->
                                <th:block th:with="startPage=${T(java.lang.Math).max(2, currentPage - 2)}, 
                                                 endPage=${T(java.lang.Math).min(totalPages - 1, currentPage + 2)}">
                                    <li class="page-item" th:each="pageNum : ${#numbers.sequence(startPage, endPage)}" 
                                        th:classappend="${pageNum == currentPage ? 'active' : ''}">
                                        <a class="page-link" th:href="@{/(page=${pageNum})}" th:text="${pageNum}">5</a>
                                    </li>
                                </th:block>
                                
                                <!-- 后省略号 -->
                                <li class="page-item disabled" th:if="${currentPage < totalPages - 3}">
                                    <span class="page-link">...</span>
                                </li>
                                
                                <!-- 总是显示最后一页 -->
                                <li class="page-item" th:classappend="${currentPage == totalPages ? 'active' : ''}">
                                    <a class="page-link" th:href="@{/(page=${totalPages})}" th:text="${totalPages}">100</a>
                                </li>
                            </th:block>
                            
                            <!-- 下一页 -->
                            <li class="page-item" th:classappend="${currentPage == totalPages ? 'disabled' : ''}">
                                <a class="page-link" th:href="@{/(page=${currentPage + 1})}" title="下一页">
                                    <span aria-hidden="true">&raquo;</span>
                                </a>
                            </li>
                            
                            <!-- 末页 -->
                            <li class="page-item" th:classappend="${currentPage == totalPages ? 'disabled' : ''}">
                                <a class="page-link" th:href="@{/(page=${totalPages})}" title="末页">
                                    <span aria-hidden="true">&raquo;&raquo;</span>
                                </a>
                            </li>
                        </ul>
                    </nav>
                    
                    <!-- 快速跳转 -->
                    <div class="quick-jump text-center mt-2">
                        <span class="text-muted small">跳转到</span>
                        <form th:action="@{/}" method="get" class="d-inline-block mx-2">
                            <input type="number" name="page" min="1" th:max="${totalPages}" 
                                   class="form-control d-inline-block" style="width: 70px; display: inline-block;"
                                   placeholder="页码" required>
                            <span class="text-muted small">/ <span th:text="${totalPages}">100</span> 页</span>
                            <button type="submit" class="btn btn-sm btn-outline-primary ms-2">跳转</button>
                        </form>
                    </div>
                </div>

                <!-- 选择性显示 -->
                <div th:if="${totalBlogs == 0}" class="alert alert-info">
                    还没有文章，先来写一篇吧~ 御坂网路支持中...
                </div>
                <div th:if="${totalBlogs > 0}" class="alert alert-info">
                    已收录 <span th:text="${totalBlogs}"></span> 篇文章~ 御坂网路支持中...
                </div>
            </div>

            <!-- 右侧栏 -->
            <aside class="col-lg-3 col-md-12 mb-4">
                <div class="sidebar-right">
                    <div class="sidebar-section">
                        <h6 class="sidebar-title">
                            <i class="bi bi-fire"></i> 热门文章
                        </h6>
                        <ul class="list-unstyled sidebar-list">
                            <li th:if="${hotBlogs == null || hotBlogs.isEmpty()}">
                                <a href="#" class="sidebar-link">暂无热门文章</a>
                            </li>
                            <li th:each="blog : ${hotBlogs}">
                                <a th:href="@{/blogs/read/{id}(id=${blog.id})}" class="sidebar-link" 
                                   th:text="${#strings.abbreviate(blog.title, 13)}">标题</a>
                            </li>
                        </ul>
                    </div>

                    <div class="sidebar-section mt-4" th:if="${selectedTagId == null}">
                        <h6 class="sidebar-title">
                            <i class="bi bi-clock-history"></i> 最新评论
                        </h6>
                        <ul class="list-unstyled sidebar-list" id="recentCommentsList">
                            <li th:if="${recentComments == null || recentComments.isEmpty()}">
                                <div class="comment-item">
                                    <div class="comment-text">暂无评论</div>
                                </div>
                            </li>
                            <li th:each="comment : ${recentComments}">
                                <a th:href="@{/blogs/read/{id}(id=${comment.b_id})}" class="sidebar-link">
                                    <div class="comment-item">
                                        <div class="comment-user" th:text="${comment.author_name != null ? comment.author_name : '用户' + comment.u_id}">用户</div>
                                        <div class="comment-text">
                                            <span class="comment-content-short" 
                                                  th:text="${comment.content.length() > 15 ? comment.content.substring(0, 15) + '...' : comment.content}">评论内容</span>
                                        </div>
                                    </div>
                                </a>
                            </li>
                        </ul>
                    </div>
                </div>
            </aside>
        </div>
    </main>

    <!-- 99.Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/weather.js"></script>
</body>
</html>
