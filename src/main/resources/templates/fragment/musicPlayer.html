<!-- 音乐播放器片段 -->
<th:block th:fragment="musicPlayer">
<style>
  /* ===== CSS 变量（共享） ===== */
  #musicMiniCapsule, #musicFullPanel {
    --mp-bg: rgba(15, 15, 35, 0.95);
    --mp-accent: var(--accent);
    --mp-green: #22C55E;
    --mp-text: #FFFFFF;
    --mp-text-dim: rgba(255, 255, 255, 0.6);
    --mp-text-faint: rgba(255, 255, 255, 0.3);
    --mp-panel-bg: rgba(30, 35, 50, 0.97);
    --mp-border: var(--accent-15);
    --mp-radius: 16px;
    --mp-transition: 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    --mp-transition-ease: 0.25s ease;
  }

  /* ===== 迷你胶囊 ===== */
  #musicMiniCapsule {
    position: fixed;
    bottom: 24px;
    left: calc(100vw - 340px - 24px);
    z-index: 9998;
    display: none;
    align-items: center;
    gap: 10px;
    padding: 8px 16px 8px 8px;
    background: var(--mp-panel-bg);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid var(--mp-border);
    border-radius: 28px;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4), 0 2px 8px rgba(0, 0, 0, 0.2);
    cursor: grab;
    user-select: none;
    -webkit-user-select: none;
    transition: box-shadow var(--mp-transition-ease), transform var(--mp-transition-ease);
  }

  #musicMiniCapsule:active {
    cursor: grabbing;
  }

  #musicMiniCapsule.dragging {
    cursor: grabbing;
    box-shadow: 0 16px 48px rgba(0, 0, 0, 0.6);
    transition: box-shadow var(--mp-transition-ease);
  }

  #musicMiniCapsule.visible {
    display: flex;
  }

  .capsule-cover-wrap {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    overflow: hidden;
    flex-shrink: 0;
    border: 2px solid var(--mp-border);
    background: linear-gradient(135deg, #87CEEB 0%, #5BA4CF 100%);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .capsule-cover-wrap.spinning {
    animation: capsuleSpin 8s linear infinite;
  }

  .capsule-cover-wrap i {
    font-size: 1.2rem;
    color: #fff;
  }

  @keyframes capsuleSpin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  .capsule-info {
    display: flex;
    flex-direction: column;
    min-width: 0;
    max-width: 110px;
  }

  .capsule-info .capsule-title {
    font-size: 0.78rem;
    color: var(--mp-text);
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .capsule-info .capsule-artist {
    font-size: 0.68rem;
    color: var(--mp-text-dim);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .capsule-play-btn {
    width: 34px;
    height: 34px;
    border-radius: 50%;
    border: none;
    background: linear-gradient(135deg, #87CEEB 0%, #5BA4CF 100%);
    color: #fff;
    font-size: 0.9rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all var(--mp-transition-ease);
    flex-shrink: 0;
  }

  .capsule-play-btn:hover {
    transform: scale(1.1);
    box-shadow: 0 4px 12px rgba(135, 206, 235, 0.4);
  }

  /* ===== 展开面板 ===== */
  #musicFullPanel {
    position: fixed;
    bottom: 90px;
    left: calc(100vw - 340px - 24px);
    z-index: 9997;
    width: 340px;
    max-height: 560px;
    background: var(--mp-panel-bg);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--mp-border);
    border-radius: var(--mp-radius);
    box-shadow: 0 16px 48px rgba(0, 0, 0, 0.5);
    display: none;
    flex-direction: column;
    overflow-y: auto;
    overflow-x: hidden;
    cursor: default;
    transition: opacity var(--mp-transition-ease), transform var(--mp-transition-ease);
  }

  #musicFullPanel::-webkit-scrollbar {
    width: 4px;
  }

  #musicFullPanel::-webkit-scrollbar-thumb {
    background: rgba(255, 255, 255, 0.12);
    border-radius: 2px;
  }

  #musicFullPanel.visible {
    display: flex;
  }

  #musicFullPanel.panel-entering {
    opacity: 0;
    transform: translateY(20px) scale(0.95);
  }

  #musicFullPanel.panel-entered {
    opacity: 1;
    transform: translateY(0) scale(1);
  }

  /* 面板头部 */
  .panel-header {
    display: flex;
    align-items: center;
    padding: 12px 16px;
    gap: 10px;
    border-bottom: 1px solid var(--mp-border);
    cursor: grab;
    user-select: none;
    -webkit-user-select: none;
  }

  .panel-header:active {
    cursor: grabbing;
  }

  .panel-drag-handle {
    display: flex;
    flex-direction: column;
    gap: 2px;
    padding: 4px 0;
  }

  .panel-drag-handle span {
    display: block;
    width: 18px;
    height: 2px;
    background: rgba(255, 255, 255, 0.2);
    border-radius: 1px;
  }

  .panel-track-info {
    flex: 1;
    min-width: 0;
  }

  .panel-track-title {
    font-size: 0.85rem;
    color: var(--mp-text);
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .panel-track-artist {
    font-size: 0.7rem;
    color: var(--mp-text-dim);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .panel-close-btn {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    border: none;
    background: rgba(255, 255, 255, 0.08);
    color: var(--mp-text-dim);
    font-size: 0.75rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all var(--mp-transition-ease);
    flex-shrink: 0;
  }

  .panel-close-btn:hover {
    background: rgba(255, 107, 107, 0.2);
    color: #ff6b6b;
  }

  /* 封面区域：频谱可视化 */
  .panel-cover-section {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 8px 16px;
    position: relative;
    overflow: hidden;
    min-height: 120px;
  }

  #visualizerCanvas {
    width: 100%;
    height: 100%;
    border-radius: 10px;
  }

  /* Bass 演奏动效 GIF，懒加载于频谱底层 */
  .bass-gif {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: contain;
    opacity: 0;
    pointer-events: none;
    border-radius: 10px;
    transition: opacity 1.2s ease;
  }

  .bass-gif.loaded {
    opacity: 0.25;
  }

  .viz-mode-btn {
    position: absolute;
    right: 16px;
    font-size: 0.75rem;
  }

  /* 进度条 */
  .panel-progress-section {
    padding: 0 16px 8px;
  }

  .panel-progress-bar {
    width: 100%;
    height: 4px;
    background: rgba(255, 255, 255, 0.1);
    border-radius: 2px;
    cursor: pointer;
    position: relative;
    overflow: visible;
    touch-action: none;
  }

  .panel-progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #87CEEB, #5BA4CF);
    border-radius: 2px;
    width: 0%;
    transition: width 0.1s linear;
    position: relative;
  }

  .panel-progress-fill::after {
    content: '';
    position: absolute;
    right: -5px;
    top: -3px;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: #fff;
    opacity: 0;
    transition: opacity 0.2s ease;
  }

  .panel-progress-bar:hover .panel-progress-fill::after {
    opacity: 1;
  }

  .panel-time-row {
    display: flex;
    justify-content: space-between;
    padding: 4px 0 0;
    font-size: 0.65rem;
    color: var(--mp-text-faint);
  }

  /* 控制按钮 */
  .panel-controls {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    padding: 6px 16px 12px;
  }

  .ctrl-btn {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: none;
    background: rgba(255, 255, 255, 0.08);
    color: var(--mp-text-dim);
    font-size: 0.85rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all var(--mp-transition-ease);
  }

  .ctrl-btn:hover {
    background: rgba(255, 255, 255, 0.15);
    color: var(--mp-text);
  }

  .mode-btn {
    position: absolute;
    left: 16px;
    font-size: 0.8rem;
  }

  .mode-btn.shuffle {
    color: var(--mp-accent);
    background: rgba(135, 206, 235, 0.15);
  }

  .ctrl-btn-play {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    border: none;
    background: linear-gradient(135deg, #87CEEB 0%, #5BA4CF 100%);
    color: #fff;
    font-size: 1.1rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all var(--mp-transition-ease);
    box-shadow: 0 4px 16px rgba(135, 206, 235, 0.3);
  }

  .ctrl-btn-play:hover {
    transform: scale(1.08);
    box-shadow: 0 6px 20px rgba(135, 206, 235, 0.5);
  }

  /* 歌词区域 */
  .panel-lyrics {
    flex: 1;
    overflow-y: auto;
    padding: 4px 16px 12px;
    max-height: 220px;
    scroll-behavior: smooth;
    mask-image: linear-gradient(to bottom, transparent 0%, black 10%, black 90%, transparent 100%);
    -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 10%, black 90%, transparent 100%);
  }

  .panel-lyrics::-webkit-scrollbar {
    width: 3px;
  }

  .panel-lyrics::-webkit-scrollbar-thumb {
    background: rgba(255, 255, 255, 0.1);
    border-radius: 2px;
  }

  .lyric-line {
    text-align: center;
    padding: 4px 8px;
    font-size: 0.75rem;
    color: var(--mp-text-dim);
    transition: all 0.3s ease;
    cursor: pointer;
    border-radius: 4px;
    min-height: 24px;
    line-height: 1.5;
  }

  .lyric-line.active {
    color: var(--mp-accent);
    font-size: 0.85rem;
    font-weight: 600;
    text-shadow: 0 0 8px rgba(135, 206, 235, 0.3);
  }

  .lyric-line:hover {
    color: var(--mp-text);
  }

  /* 歌单区域 —— 可折叠抽屉 */
  .panel-playlist {
    border-top: 1px solid var(--mp-border);
  }

  .playlist-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 9px 16px;
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
    transition: background var(--mp-transition-ease);
  }

  .playlist-header:hover {
    background: rgba(255, 255, 255, 0.04);
  }

  .playlist-header-label {
    font-size: 0.7rem;
    color: var(--mp-text-faint);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .playlist-toggle-icon {
    font-size: 0.75rem;
    color: var(--mp-text-faint);
    transition: transform 0.25s ease;
  }

  /* 折叠态：图标旋转，内容收起 */
  .panel-playlist.collapsed .playlist-toggle-icon {
    transform: rotate(180deg);
  }

  .playlist-body {
    max-height: 280px;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 4px 12px 8px;
    transition: max-height 0.3s ease, padding 0.3s ease;
  }

  .panel-playlist.collapsed .playlist-body {
    max-height: 0;
    padding-top: 0;
    padding-bottom: 0;
  }

  .playlist-body::-webkit-scrollbar {
    width: 3px;
  }

  .playlist-body::-webkit-scrollbar-thumb {
    background: rgba(255, 255, 255, 0.1);
    border-radius: 2px;
  }

  .playlist-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 10px;
    border-radius: 8px;
    cursor: pointer;
    transition: all var(--mp-transition-ease);
  }

  .playlist-item:hover {
    background: rgba(255, 255, 255, 0.05);
  }

  .playlist-item.active {
    background: rgba(135, 206, 235, 0.1);
  }

  .playlist-item-num {
    width: 20px;
    font-size: 0.7rem;
    color: var(--mp-text-faint);
    text-align: center;
    flex-shrink: 0;
  }

  .playlist-item.active .playlist-item-num {
    color: var(--mp-accent);
  }

  .playlist-item-info {
    flex: 1;
    min-width: 0;
  }

  .playlist-item-title {
    font-size: 0.78rem;
    color: var(--mp-text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .playlist-item.active .playlist-item-title {
    color: var(--mp-accent);
  }

  .playlist-item-artist {
    font-size: 0.68rem;
    color: var(--mp-text-dim);
  }

  .playlist-item-playing {
    color: var(--mp-green);
    font-size: 0.65rem;
  }

  /* ===== 响应式 ===== */
  @media (max-width: 480px) {
    #musicFullPanel {
      width: calc(100vw - 16px);
      right: 8px;
      left: 8px;
      bottom: 80px;
      max-height: 480px;
      border-radius: 12px;
    }

    #musicMiniCapsule {
      bottom: 16px;
      left: 8px;
    }

    .capsule-info {
      max-width: 80px;
    }
  }

  /* ===== prefers-reduced-motion ===== */
  @media (prefers-reduced-motion: reduce) {
    .capsule-cover-wrap.spinning {
      animation: none;
    }

    #musicFullPanel {
      transition: opacity 0.1s ease;
    }

    .lyric-line {
      transition: none;
    }
  }
</style>

<!-- 迷你胶囊 -->
<div id="musicMiniCapsule">
  <div class="capsule-cover-wrap" id="capsuleCover">
    <i class="bi bi-music-note-beamed"></i>
  </div>
  <div class="capsule-info">
    <span class="capsule-title" id="capsuleTitle">TOMATO</span>
    <span class="capsule-artist" id="capsuleArtist">7co</span>
  </div>
  <button class="capsule-play-btn" id="capsulePlayBtn" title="播放/暂停">
    <i class="bi bi-play-fill"></i>
  </button>
</div>

<!-- 展开面板 -->
<div id="musicFullPanel">
  <!-- 头部 -->
  <div class="panel-header" id="panelHeader">
    <div class="panel-drag-handle">
      <span></span>
      <span></span>
    </div>
    <div class="panel-track-info">
      <div class="panel-track-title" id="panelTitle">TOMATO</div>
      <div class="panel-track-artist" id="panelArtist">7co</div>
    </div>
    <button class="panel-close-btn" id="panelCloseBtn" title="收起面板">
      <i class="bi bi-chevron-down"></i>
    </button>
  </div>

  <!-- 歌词 -->
  <div class="panel-lyrics" id="lyricsContainer">
    <div class="lyric-line" id="noLyricLine">暂无歌词</div>
  </div>

  <!-- 进度条 -->
  <div class="panel-progress-section">
    <div class="panel-progress-bar" id="progressBar">
      <div class="panel-progress-fill" id="progressFill"></div>
    </div>
    <div class="panel-time-row">
      <span id="currentTime">00:00</span>
      <span id="totalTime">00:00</span>
    </div>
  </div>

  <!-- 控制按钮 -->
  <div class="panel-controls">
    <button class="ctrl-btn mode-btn" id="playModeBtn" title="顺序循环">
      <i class="bi bi-arrow-repeat"></i>
    </button>
    <button class="ctrl-btn" id="prevBtn" title="上一首">
      <i class="bi bi-skip-start-fill"></i>
    </button>
    <button class="ctrl-btn-play" id="playBtn" title="播放/暂停">
      <i class="bi bi-play-fill"></i>
    </button>
    <button class="ctrl-btn" id="nextBtn" title="下一首">
      <i class="bi bi-skip-end-fill"></i>
    </button>
    <button class="ctrl-btn viz-mode-btn" id="vizModeBtn" title="柱状频谱">
      <i class="bi bi-bar-chart-fill"></i>
    </button>
  </div>

  <!-- 封面：Bass 演奏动效 + 音频频谱可视化 -->
  <div class="panel-cover-section" id="coverSection">
    <img id="bassGif" class="bass-gif"
         src="/images/PlayBass_Clean.gif"
         alt="Bass演奏动效"
         loading="lazy"
         fetchpriority="low"
         onload="this.classList.add('loaded')" />
    <canvas id="visualizerCanvas"></canvas>
  </div>

  <!-- 歌单 -->
  <div class="panel-playlist" id="playlistSection">
    <div class="playlist-header" id="playlistHeader">
      <span class="playlist-header-label">歌单</span>
      <i class="bi bi-chevron-up playlist-toggle-icon"></i>
    </div>
    <div class="playlist-body" id="playlistBody">
      <div id="playlistContainer"></div>
    </div>
  </div>
</div>

<script src="/js/musicPlayer.js"></script>
</th:block>
