<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div id="weather-component" class="weather-component" th:fragment="weather">
    <div class="weather-location" id="weather-location">
        <i class="bi bi-geo-alt"></i><span>加载中...</span>
    </div>
    <div class="weather-greeting" id="weather-greeting">--</div>
    <div class="weather-icon-row">
        <span id="weather-icon" class="weather-icon">⏳</span>
    </div>
    <div class="weather-temp" id="weather-temp">--°</div>
    <div class="weather-desc" id="weather-desc">--</div>
    <div class="weather-divider"></div>
    <div class="weather-forecast">
        <div class="weather-day">
            <div class="weather-day-label">今日</div>
            <div class="weather-day-range" id="weather-today-range">--° ~ --°</div>
        </div>
        <div class="weather-day">
            <div class="weather-day-label">明日</div>
            <div class="weather-day-range" id="weather-tomorrow-range">--° ~ --°</div>
            <div class="weather-day-desc" id="weather-tomorrow-desc">--</div>
        </div>
    </div>
    <div class="weather-attribution">
        <a href="https://www.seniverse.com/" target="_blank" rel="noopener">心知天气</a>
    </div>
</div>
</body>
</html>
