<nav class="navbar navbar-expand-lg navbar-custom">
  <div class="container">
    <a class="navbar-brand" th:href="@{/}">MyBlog</a>

    <!-- 居中头像 -->
    <div class="navbar-avatar mx-auto">
      <!-- 已登录：头像 + 悬浮下拉菜单 -->
      <th:block th:if="${currentUser != null}">
        <div class="avatar-dropdown" id="avatarDropdown">
          <img th:if="${currentUser.avatar != null}"
               th:src="${currentUser.avatar}"
               alt="用户头像"
               class="rounded-circle avatar-img"
               style="width: 40px; height: 40px; object-fit: cover;"
               onclick="toggleAvatarMenu(event)">
          <img th:if="${currentUser.avatar == null}"
               src="/images/default-avatar.png"
               alt="默认头像"
               class="rounded-circle avatar-img"
               style="width: 40px; height: 40px; object-fit: cover;"
               onclick="toggleAvatarMenu(event)">
          <div class="avatar-dropdown-menu">
            <a th:href="@{/user/profile}" class="dropdown-item">
              <i class="bi bi-person"></i> 个人主页
            </a>
            <a class="dropdown-item" onclick="openEditProfileModal()" style="cursor: pointer;">
              <i class="bi bi-pencil-square"></i> 编辑资料
            </a>
            <a th:href="@{/archives}" class="dropdown-item">
              <i class="bi bi-archive"></i> 我的归档
            </a>
            <div class="dropdown-divider"></div>
            <a class="dropdown-item" onclick="handleLogout()" style="cursor: pointer;">
              <i class="bi bi-box-arrow-right"></i> 退出登录
            </a>
          </div>
        </div>
      </th:block>
      <!-- 未登录：显示登录入口 -->
      <img th:if="${currentUser == null}"
           src="/images/default-avatar.png"
           alt="点击登录"
           class="rounded-circle avatar-img"
           style="width: 40px; height: 40px; object-fit: cover; cursor: pointer;"
           onclick="openAuthModal('login')"
           title="点击登录 / 注册">
    </div>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMain">
      <span class="navbar-toggler-icon"></span>

        <li class="nav-item"><a class="nav-link" th:classappend="${currentPage == 'game' ? 'active' : ''}" th:href="@{/game}">小游戏</a></li>
        <li class="nav-item ms-lg-3">
          <a th:href="@{/blogs/write}" class="btn btn-write">

<!-- 编辑资料模态框（仅登录用户可见） -->
<th:block th:if="${currentUser != null}">
<div class="edit-profile-overlay" id="editProfileOverlay">
    <div class="edit-profile-modal">
        <div class="edit-profile-header">
            <h5>编辑资料</h5>
            <button class="edit-profile-close" onclick="closeEditProfileModal()">&#10005;</button>
        </div>
        <div class="edit-profile-body">
            <!-- 头像 -->
            <div class="edit-profile-field">
                <div class="edit-profile-label">头像</div>
                <div class="edit-avatar-area">
                    <img id="editAvatarPreview"
                         th:src="${currentUser.avatar != null ? currentUser.avatar : '/images/default-avatar.png'}"
                         class="edit-avatar-preview" alt="头像">
                    <div>
                        <input type="file" id="editAvatarFile" accept="image/*" style="display: none;" onchange="initEditCrop(this.files[0])">
                        <button type="button" class="edit-avatar-upload-btn" onclick="document.getElementById('editAvatarFile').click()">
                            <i class="bi bi-upload"></i> 上传新头像
                        </button>
                        <div id="editAvatarMsg" style="font-size:0.72rem;color:rgba(255,255,255,0.35);margin-top:4px;"></div>
                    </div>
                </div>
            </div>
            <!-- 昵称 -->
            <div class="edit-profile-field">
                <div class="edit-profile-label">昵称</div>
                <input type="text" class="edit-profile-input" id="editNickname" th:value="${currentUser.nickname}" maxlength="32" placeholder="输入昵称">
            </div>
            <!-- 简介 -->
            <div class="edit-profile-field">
                <div class="edit-profile-label">简介</div>
                <input type="text" class="edit-profile-input" id="editIntro" th:value="${currentUser.intro}" maxlength="255" placeholder="介绍一下自己">
            </div>
            <!-- 邮箱 -->
            <div class="edit-profile-field">
                <div class="edit-profile-label">邮箱</div>
                <input type="email" class="edit-profile-input" id="editEmail" th:value="${currentUser.email}" maxlength="255" placeholder="输入邮箱">
            </div>
            <!-- 性别 -->
            <div class="edit-profile-field">
                <div class="edit-profile-label">性别</div>
                <select class="edit-profile-select" id="editGender">
                    <option value="0" th:selected="${currentUser.gender == null or currentUser.gender == 0}">未设置</option>
                    <option value="1" th:selected="${currentUser.gender == 1}">男</option>
                    <option value="2" th:selected="${currentUser.gender == 2}">女</option>
                </select>
            </div>
            <!-- GitHub -->
            <div class="edit-profile-field">
                <div class="edit-profile-label">GitHub 用户名</div>
                <input type="text" class="edit-profile-input" id="editGithub" th:value="${currentUser.githubUsername}" maxlength="255" placeholder="输入 GitHub 用户名">
            </div>
            <div class="edit-profile-field">
                <div class="edit-profile-label">
                    GitHub Token
                    <span style="font-size:0.68rem;color:rgba(255,255,255,0.25);font-weight:400;">（<a href="https://github.com/settings/tokens" target="_blank" style="color:#87CEEB;">获取方式</a>，需勾选 read:user，仅自己可见）</span>
                </div>
                <input type="password" class="edit-profile-input" id="editGithubToken" maxlength="255" placeholder="ghp_xxxxxxxxxxxx" autocomplete="off">
            </div>
            <button class="edit-profile-save-btn" onclick="saveEditProfile()">保存</button>
        </div>
    </div>
</div>

<!-- 头像裁剪弹窗 -->
<div class="crop-overlay" id="editCropOverlay">
    <div class="crop-modal">
        <div class="crop-header">
            <span>裁剪头像</span>
            <button type="button" class="crop-close" onclick="closeEditCrop()">&#10005;</button>
        </div>
        <div class="crop-body">
            <div class="crop-area">
                <img id="editCropImage" draggable="false">
            </div>
            <div class="crop-preview-side">
                <div class="preview-label">预览</div>
                <div class="preview-circle" id="editPreviewCircle"></div>
                <div style="font-size:0.68rem;color:rgba(255,255,255,0.3);">80 × 80</div>
            </div>
        </div>
        <div class="crop-footer">
            <div class="crop-tools">
                <button type="button" onclick="editCropperRotate(-45)"><i class="bi bi-arrow-counterclockwise"></i></button>
                <button type="button" onclick="editCropperZoom(0.1)"><i class="bi bi-zoom-in"></i></button>
                <button type="button" onclick="editCropperZoom(-0.1)"><i class="bi bi-zoom-out"></i></button>
                <button type="button" onclick="editCropperRotate(45)"><i class="bi bi-arrow-clockwise"></i></button>
                <button type="button" onclick="editCropperReset()"><i class="bi bi-arrow-repeat"></i></button>
            </div>
            <div class="crop-actions">
                <button type="button" class="crop-btn crop-btn-cancel" onclick="closeEditCrop()">取消</button>
                <button type="button" class="crop-btn crop-btn-confirm" onclick="confirmEditCrop()">确认上传</button>
            </div>
        </div>
    </div>
</div>
</th:block>

<!-- 登录/注册模态窗 -->
<div class="auth-overlay" id="authOverlay">
  <div class="auth-modal">
    <div class="auth-modal-header">
      <div class="auth-modal-logo">My<span>Blog</span></div>
      <button class="auth-modal-close" onclick="closeAuthModal()">&#10005;</button>
    </div>
    <div class="auth-modal-tabs">
      <div class="auth-tab active" id="authTabLogin" onclick="switchAuthTab('login')">登录</div>
      <div class="auth-tab" id="authTabRegister" onclick="switchAuthTab('register')">注册</div>
      <div class="auth-tab" id="authTabReset" onclick="switchAuthTab('reset')">忘记密码</div>
    </div>
    <div class="auth-modal-body">
      <!-- 登录面板 -->
      <div class="auth-form-panel active" id="loginPanel">
        <div class="auth-form-group">
          <label>邮箱</label>
          <input type="text" class="auth-form-input" id="loginEmail" placeholder="请输入邮箱地址" autocomplete="email" maxlength="255">
          <div class="auth-error-msg" data-field="loginEmail"></div>
        </div>
        <div class="auth-form-group">
          <label>密码</label>
          <input type="password" class="auth-form-input" id="loginPassword" placeholder="请输入密码" autocomplete="current-password" maxlength="255">
          <div class="auth-error-msg" data-field="loginPassword"></div>
        </div>
        <div class="auth-form-group">
          <label>图形验证码</label>
          <div style="display:flex; gap:10px; align-items:center;">
            <input type="text" class="auth-form-input" id="loginCaptcha" placeholder="不区分大小写" maxlength="4" autocomplete="off" style="flex:1;">
            <img id="captchaImg" src="" alt="验证码" onclick="refreshCaptcha()" style="height:40px; cursor:pointer; border-radius:6px; border:1px solid rgba(135,206,235,0.3);" title="点击刷新">
            <a onclick="refreshCaptcha()" style="color:#87CEEB; font-size:0.78rem; cursor:pointer; white-space:nowrap;">换一张</a>
          </div>
          <div class="auth-error-msg" data-field="loginCaptcha"></div>
        </div>
        <button class="auth-btn-submit auth-btn-login" onclick="handleLogin()">登 录</button>
        <div class="auth-switch-text">
          <a onclick="switchAuthTab('reset')" style="float:left;">忘记密码？</a>
          还没有账号？<a onclick="switchAuthTab('register')">立即注册</a>
        </div>
      </div>
      <!-- 重置密码面板 -->
      <div class="auth-form-panel" id="resetPanel">
        <div class="auth-form-group">
          <label>邮箱</label>
          <input type="email" class="auth-form-input" id="resetEmail" placeholder="请输入注册邮箱" autocomplete="email" maxlength="255">
          <div class="auth-error-msg" data-field="resetEmail"></div>
        </div>
        <div class="auth-form-group">
          <label>邮箱验证码</label>
          <div style="display:flex; gap:10px;">
            <input type="text" class="auth-form-input" id="resetEmailCode" placeholder="6位数字验证码" maxlength="6" autocomplete="off" style="flex:1;">
            <button type="button" id="resetSendCodeBtn" class="auth-send-code-btn" onclick="sendResetCode()">发送验证码</button>
          </div>
          <div class="auth-error-msg" data-field="resetEmailCode"></div>
        </div>
        <div class="auth-form-group">
          <label>新密码</label>
          <input type="password" class="auth-form-input" id="resetNewPassword" placeholder="至少 6 位新密码" autocomplete="new-password" maxlength="255">
          <div class="auth-error-msg" data-field="resetNewPassword"></div>
        </div>
        <div class="auth-form-group">
          <label>确认新密码</label>
          <input type="password" class="auth-form-input" id="resetConfirmPassword" placeholder="再次输入新密码" autocomplete="new-password" maxlength="255">
          <div class="auth-error-msg" data-field="resetConfirmPassword"></div>
        </div>
        <button class="auth-btn-submit auth-btn-login" onclick="handleResetPassword()">重置密码</button>
        <div class="auth-switch-text">
          <a onclick="switchAuthTab('login')">返回登录</a>
        </div>
      </div>
      <!-- 注册面板 -->
      <div class="auth-form-panel" id="registerPanel">
        <div class="auth-form-group">
          <label>昵称</label>
          <input type="text" class="auth-form-input" id="registerNickname" placeholder="如何称呼你？" autocomplete="nickname" maxlength="32">
          <div class="auth-error-msg" data-field="registerNickname"></div>
        </div>
        <div class="auth-form-group">
          <label>邮箱</label>
          <input type="email" class="auth-form-input" id="registerEmail" placeholder="请输入邮箱地址" autocomplete="email" maxlength="255">
          <div class="auth-error-msg" data-field="registerEmail"></div>
        </div>
        <div class="auth-form-group">
          <label>密码</label>
          <input type="password" class="auth-form-input" id="registerPassword" placeholder="至少 6 位密码" autocomplete="new-password" maxlength="255">
          <div class="auth-error-msg" data-field="registerPassword"></div>
        </div>
        <div class="auth-form-group">
          <label>确认密码</label>
          <input type="password" class="auth-form-input" id="registerConfirmPassword" placeholder="再次输入密码" autocomplete="new-password" maxlength="255">
          <div class="auth-error-msg" data-field="registerConfirmPassword"></div>
        </div>
        <div class="auth-form-group">
          <label>邮箱验证码</label>
          <div style="display:flex; gap:10px;">
            <input type="text" class="auth-form-input" id="registerEmailCode" placeholder="6位数字验证码" maxlength="6" autocomplete="off" style="flex:1;">
            <button type="button" id="sendCodeBtn" class="auth-send-code-btn" onclick="sendVerificationCode()">发送验证码</button>
          </div>
          <div class="auth-error-msg" data-field="registerEmailCode"></div>
        </div>
        <button class="auth-btn-submit auth-btn-register" onclick="handleRegister()">注 册</button>
        <div class="auth-switch-text">
          已有账号？<a onclick="switchAuthTab('login')">去登录</a>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="/js/toast.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/backgroundFix.js"></script>
<script src="https://cdn.jsdelivr.net/npm/cropperjs@1.6.2/dist/cropper.min.js"></script>
<script>
    // ===== 编辑资料模态框 =====
    function openEditProfileModal() {
        document.getElementById('editProfileOverlay').classList.add('active');
    }
    function closeEditProfileModal() {
        document.getElementById('editProfileOverlay').classList.remove('active');
    }

    function saveEditProfile() {
        var btn = document.querySelector('.edit-profile-save-btn');
        btn.disabled = true;
        btn.textContent = '保存中...';

        var formData = new URLSearchParams();
        formData.append('nickname', document.getElementById('editNickname').value.trim());
        formData.append('intro', document.getElementById('editIntro').value.trim());
        formData.append('email', document.getElementById('editEmail').value.trim());
        formData.append('gender', document.getElementById('editGender').value);
        formData.append('githubUsername', document.getElementById('editGithub').value.trim());
        var githubToken = document.getElementById('editGithubToken').value.trim();
        if (githubToken) {
            formData.append('githubToken', githubToken);
        }

        authFetch('/user/profile/update', {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: formData.toString()
        })
        .then(function(res) { return res.json(); })
        .then(function(data) {
            if (data.code === 200) {
                closeEditProfileModal();
                location.reload();
            } else {
                showToast(data.msg || '保存失败', 'error');
            }
        })
        .catch(function() { showToast('网络错误', 'error'); })
        .finally(function() {
            btn.disabled = false;
            btn.textContent = '保存';
        });
    }

    // ===== 头像裁剪 =====
    var editCropper = null;
    var editCropFileName = 'avatar.jpg';

    function initEditCrop(file) {
        if (!file) return;
        if (file.size > 10 * 1024 * 1024) {
            document.getElementById('editAvatarMsg').textContent = '图片不能超过10MB';
            document.getElementById('editAvatarMsg').style.color = '#ff6b6b';
            document.getElementById('editAvatarFile').value = '';
            return;
        }
        editCropFileName = file.name;
        var url = URL.createObjectURL(file);
        document.getElementById('editCropImage').src = url;
        document.getElementById('editCropOverlay').classList.add('active');
        if (editCropper) editCropper.destroy();
        editCropper = new Cropper(document.getElementById('editCropImage'), {
            aspectRatio: 1,
            viewMode: 1,
            dragMode: 'move',
            autoCropArea: 1,
            preview: '#editPreviewCircle',
            background: false,
            rotatable: true,
            scalable: true,
            zoomable: true,
            zoomOnWheel: true,
            cropBoxMovable: true,
            cropBoxResizable: true,
            toggleDragModeOnDblclick: false
        });
    }

    function editCropperRotate(deg) { if (editCropper) editCropper.rotate(deg); }
    function editCropperZoom(delta) { if (editCropper) editCropper.zoom(delta); }
    function editCropperReset() { if (editCropper) editCropper.reset(); }

    function closeEditCrop() {
        document.getElementById('editCropOverlay').classList.remove('active');
        document.getElementById('editAvatarFile').value = '';
        if (editCropper) { editCropper.destroy(); editCropper = null; }
        var img = document.getElementById('editCropImage');
        if (img.src && img.src.startsWith('blob:')) { URL.revokeObjectURL(img.src); img.src = ''; }
    }

    function confirmEditCrop() {
        if (!editCropper) return;
        var canvas = editCropper.getCroppedCanvas({ width: 256, height: 256, imageSmoothingQuality: 'high' });
        if (!canvas) return;
        canvas.toBlob(function(blob) {
            if (!blob) return;
            var msgEl = document.getElementById('editAvatarMsg');
            msgEl.textContent = '上传中...';
            msgEl.style.color = 'rgba(255,255,255,0.5)';
            var formData = new FormData();
            formData.append('file', blob, editCropFileName);
            authFetch('/user/avatar/upload', { method: 'POST', body: formData })
            .then(function(res) { return res.json(); })
            .then(function(data) {
                if (data.code === 200) {
                    document.getElementById('editAvatarPreview').src = data.data + '?t=' + Date.now();
                    msgEl.textContent = '头像已更新';
                    msgEl.style.color = '#6bd9a0';
                    closeEditCrop();
                } else {
                    msgEl.textContent = data.msg || '上传失败';
                    msgEl.style.color = '#ff6b6b';
                    closeEditCrop();
                }
            })
            .catch(function() {
                msgEl.textContent = '上传失败';
                msgEl.style.color = '#ff6b6b';
                closeEditCrop();
            });
        }, 'image/jpeg', 0.85);
    }

    // ===== 头像下拉菜单：点击切换 =====
    function toggleAvatarMenu(e) {
        e.stopPropagation();
        document.getElementById('avatarDropdown').classList.toggle('show');
    }
    document.addEventListener('click', function(e) {
        var dd = document.getElementById('avatarDropdown');
        if (dd && dd.classList.contains('show') && !dd.contains(e.target)) {
            dd.classList.remove('show');
        }
    });
</script>
</th:block>
