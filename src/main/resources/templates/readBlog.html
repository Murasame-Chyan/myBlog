<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>博客</title>
    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/css/common.css">
    <link rel="stylesheet" href="/css/readBlog.css">
    <!-- KaTeX 数学公式渲染 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
</head>
<body>
    <!-- 1.header -->
    <header th:replace="~{fragment/header :: nav('index')}"></header>

    <!-- 2.blogDetail -->
    <main class="container my-4">
        <!-- 标题 -->
        <input type="hidden" th:value="${blog != null ? blog.getId() : 0}" id="getBlogId">
        <h2 id="textTitle" th:text="${blog.title}">标题</h2>
        <!--  meta 行  -->
        <div class="text-muted mb-3">
            <span class="me-3">
                <i class="bi bi-eye"></i>
                <span th:text="${blog.read_count != null ? blog.read_count : 0}">0</span>
            </span>
            <span class="me-3">
                <i class="bi bi-chat"></i>
                <span th:text="${commentCount != null ? commentCount : 0}">0</span>
            </span>
            <span class="me-3">作者：
                <a th:href="@{/user/profile(id=${blog.u_id})}" class="author-link">
                    <img th:src="${authorAvatar != null ? authorAvatar : '/images/default-avatar.png'}"
                         class="author-avatar-mini" alt="" style="width:22px;height:22px;object-fit:cover;">
                    <span th:text="${authorName}">1</span>
                </a>
            </span>
            <span class="me-3">发布时间：
                <span th:text="${#temporals.format(blog.created_at,'yyyy/MM/dd HH:mm')}">2025-12-03 18:42</span>
            </span>
            <span class="me-3">上次更新：
                <span th:text="${#temporals.format(blog.updated_at,'yyyy/MM/dd HH:mm')}">2025-12-03 18:42</span>
            </span>
            <span class="ms-3" th:if="${currentUser != null && currentUser.id == blog.u_id}">
                <a th:href="@{/blogs/edit/{id}(id=${blog.id})}" class="btn btn-sm btn-outline-primary">修改博客</a>
                <button type="button" class="btn btn-sm btn-outline-danger ms-2" onclick="deleteBlog()">删除博客</button>
            </span>
        </div>

        <div class="mb-3" th:if="${blog.t_id != null and blog.t_id.tagList != null and !blog.t_id.tagList.isEmpty()}">
            <th:block th:each="tagId : ${blog.t_id.tagList}">
                <span th:each="tag : ${allTags}" th:if="${tag.id == tagId}" class="blog-tag" th:text="${tag.tagName}">标签</span>
            </th:block>
        </div>

        <hr>

        <!--  正文  -->
        <div class="blog-content" id="textContent" th:utext="${blog.content}">正文</div>

        <!-- 点赞和分享区域 -->
        <div class="interaction-section mt-4 mb-4">
            <div class="interaction-buttons">
                <button type="button" class="btn btn-outline-primary me-2" id="likeButton" onclick="handleLike()">
                    <i class="bi bi-hand-thumbs-up" id="likeIcon"></i>
                    <span id="likeCount" th:text="${blog.like_count != null ? blog.like_count : 0}" class="ms-1">0</span>
                </button>
                <button type="button" class="btn btn-outline-secondary" onclick="shareBlog()">
                    <i class="bi bi-arrow-up-right"></i>
                </button>
            </div>
        </div>

        <hr>

        <!-- 评论区 -->
        <div class="comment-section mt-5">
            <h5 class="mb-4">评论 (<span id="commentCount" th:text="${commentCount != null ? commentCount : 0}">0</span>)</h5>
            
            <!-- 发表评论 -->
            <div class="card mb-4">
                <div class="card-body">
                    <h6 class="card-title mb-3">发表评论</h6>
                    <div class="mb-3">
                        <label class="form-label">评论内容</label>
                        <textarea class="form-control" id="commentContent" rows="3" placeholder="请输入评论内容" maxlength="65535"></textarea>
                    </div>
                    <button type="button" class="btn btn-sm btn-outline-light me-2 btn-emoji" data-target="commentContent" title="插入表情">😊</button>
                    <button type="button" class="btn btn-primary" onclick="submitComment()">发表评论</button>
                    <button type="button" class="btn btn-secondary ms-2" id="cancelReply" style="display: none;" onclick="cancelReply()">取消回复</button>
                    <input type="hidden" id="replyToCommentId" value="">
                    <input type="hidden" id="replyToAuthor" value="">
                </div>
            </div>

            <!-- 评论列表 -->
            <div id="commentList">
                <!-- 评论将通过JS动态加载 -->
            </div>
        </div>

        <hr>

        <!--  返回首页  -->
        <a th:href="@{/}" class="btn btn-sm btn-outline-primary">← 返回首页</a>
    </main>

    <!-- 99.Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/comment.js"></script>
    <script src="/js/blogInteraction.js"></script>
    <!-- KaTeX 数学公式渲染 -->
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
    <!-- Mermaid 流程图渲染 -->
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // KaTeX 自动渲染
            renderMathInElement(document.querySelector('.blog-content'), {
                delimiters: [
                    {left: '$$', right: '$$', display: true},
                    {left: '$', right: '$', display: false},
                    {left: '\\(', right: '\\)', display: false},
                    {left: '\\[', right: '\\]', display: true}
                ],
                throwOnError: false
            });

            // 只处理 Mermaid 原生语法
            document.querySelectorAll('.blog-content pre code.language-mermaid').forEach(function(block) {
                var pre = block.parentElement;
                var div = document.createElement('div');
                div.className = 'mermaid';
                div.textContent = block.textContent;
                pre.parentElement.replaceChild(div, pre);
            });

            // Mermaid 初始化
            if (typeof mermaid !== 'undefined') {
                mermaid.initialize({ startOnLoad: false, theme: 'dark' });
                mermaid.run();
            }
        });
    </script>
</body>
</html>
