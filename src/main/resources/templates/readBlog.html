<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>博客</title>
    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/css/common.css">
    <link rel="stylesheet" href="/css/readBlog.css">
</head>
<body>
    <!-- 1.header -->
    <header th:replace="~{fragment/header :: nav('index')}"></header>

    <!-- 2.blogDetail -->
    <main class="container my-4">
        <!-- 标题 -->
        <input type="hidden" th:value="${blog != null ? blog.getId() : 0}" id="getBlogId">
        <h2 id="textTitle" th:text="${blog.title}">标题</h2>
        <!--  meta 行  -->
        <div class="text-muted mb-3">
            <span class="me-3">
                <i class="bi bi-eye"></i>
                <span th:text="${blog.read_count != null ? blog.read_count : 0}">0</span>
            </span>
            <span class="me-3">
                <i class="bi bi-chat"></i>
                <span th:text="${commentCount != null ? commentCount : 0}">0</span>
            </span>
            <span class="me-3">作者：<span th:text="${authorName}">1</span></span>
            <span class="me-3">发布时间：
                <span th:text="${#temporals.format(blog.created_at,'yyyy/MM/dd HH:mm')}">2025-12-03 18:42</span>
            </span>
            <span class="me-3">上次更新：
                <span th:text="${#temporals.format(blog.updated_at,'yyyy/MM/dd HH:mm')}">2025-12-03 18:42</span>
            </span>
            <span class="ms-3">
                <a th:href="@{/blogs/edit/{id}(id=${blog.id})}" class="btn btn-sm btn-outline-primary">修改博客</a>
                <button type="button" class="btn btn-sm btn-outline-danger ms-2" onclick="deleteBlog()">删除博客</button>
            </span>
        </div>

        <div class="mb-3" th:if="${blog.t_id != null and blog.t_id.tagList != null and !blog.t_id.tagList.isEmpty()}">
            <span class="me-2"><strong>标签：</strong></span>
            <th:block th:each="tagId : ${blog.t_id.tagList}">
                <span th:each="tag : ${allTags}" th:if="${tag.id == tagId}" class="badge bg-secondary me-1" th:text="${tag.tagName}">标签</span>
            </th:block>
        </div>

        <hr>

        <!--  正文  -->
        <div class="blog-content" id="textContent" th:utext="${blog.content}">正文</div>

        <!-- 点赞和分享区域 -->
        <div class="interaction-section mt-4 mb-4">
            <div class="interaction-buttons">
                <button type="button" class="btn btn-outline-primary me-2" id="likeButton" onclick="handleLike()">
                    <i class="bi bi-hand-thumbs-up" id="likeIcon"></i>
                    <span id="likeCount" th:text="${blog.like_count != null ? blog.like_count : 0}" class="ms-1">0</span>
                </button>
                <button type="button" class="btn btn-outline-secondary" onclick="shareBlog()">
                    <i class="bi bi-arrow-up-right"></i>
                </button>
            </div>
        </div>

        <hr>

        <!-- 评论区 -->
        <div class="comment-section mt-5">
            <h5 class="mb-4">评论 (<span id="commentCount" th:text="${commentCount != null ? commentCount : 0}">0</span>)</h5>
            
            <!-- 发表评论 -->
            <div class="card mb-4">
                <div class="card-body">
                    <h6 class="card-title mb-3">发表评论</h6>
                    <div class="mb-3">
                        <label class="form-label">评论内容</label>
                        <textarea class="form-control" id="commentContent" rows="3" placeholder="请输入评论内容"></textarea>
                    </div>
                    <button type="button" class="btn btn-primary" onclick="submitComment()">发表评论</button>
                    <button type="button" class="btn btn-secondary ms-2" id="cancelReply" style="display: none;" onclick="cancelReply()">取消回复</button>
                    <input type="hidden" id="replyToCommentId" value="">
                    <input type="hidden" id="replyToAuthor" value="">
                </div>
            </div>

            <!-- 评论列表 -->
            <div id="commentList">
                <!-- 评论将通过JS动态加载 -->
            </div>
        </div>

        <hr>

        <!--  返回首页  -->
        <a th:href="@{/}" class="btn btn-sm btn-outline-primary">← 返回首页</a>
    </main>

    <!-- 99.Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/comment.js"></script>
    <script src="/js/blogInteraction.js"></script>
</body>
</html>
