# prod profile — 生产环境时激活

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false    # 关掉 UI 页面


logging:
  level:
    com.murasame: WARN
  file:
    path: ${LOGGING_FILE_PATH:/opt/myblog/logs}
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 30
      total-size-cap: 500MB

security:
  cookie:
    secure: true

jwt:
  access-token-expiration: 1800000     # 30 分钟
