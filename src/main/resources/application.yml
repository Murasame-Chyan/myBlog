server:
  port: 8080

spring:
  application:
    name: myBlog

  profiles:
    active: dev

  datasource:
    url: jdbc:mysql://localhost:3306/myblog
    username: root
    password:
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      host: localhost
      port: 6379
      username:
      password:

  servlet:
    session:
      tracking-modes: []    # 禁用 JSESSIONID Cookie；认证由 JWT HttpOnly Cookie 管理
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB

  mail:
    host: smtp.qq.com
    port: 587
    username:
    password:

mybatis:
  configuration:
    map-underscore-to-camel-case: true

weather:
  seniverse:
    uid:
    key:
    sign-enabled: false

github:
  # 全局兜底 PAT：用户没绑定个人 token 时用它调 GraphQL/REST API。可留空，但留空时未绑 token 的访问者只能走慢路径（页面爬虫）
  token:
  # AES 密钥放在 application.properties.bak 里（已被 .gitignore 排除），此处不要再写 token-encryption-key 否则会以空值覆盖
  # 是否禁用 SSL 证书校验：仅在内网/调试环境用，生产保持 false
  disable-ssl-verification: false

tencent:
  cos:
    secret-id:
    secret-key:
    region: ap-guangzhou
    bucket-name:
    base-url:
    folder: blog/images

# ─────────────────────────── JWT ───────────────────────────
# 基准值（生产默认），secret 通过 JWT_SECRET 环境变量注入
jwt:
  secret: ${JWT_SECRET}
  access-token-expiration: 1800000       # 30 分钟
  refresh-token-expiration: 604800000   # 7 天
