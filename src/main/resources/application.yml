server:
  port: ${SERVER_PORT:8080}
  compression:
    enabled: true
    mime-types: text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json,image/svg+xml
    min-response-size: 512

spring:
  application:
    name: myBlog

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/myblog}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      ssl:
        enabled: ${REDIS_SSL:false}
      timeout: ${REDIS_TIMEOUT:3000ms}

  mail:
    host: ${MAIL_HOST:smtp.163.com}
    port: ${MAIL_PORT:465}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    protocol: smtp
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true
          starttls:
            enable: false

  servlet:
    multipart:
      enabled: true
      max-file-size: ${MULTIPART_MAX_FILE_SIZE:10MB}
      max-request-size: ${MULTIPART_MAX_REQUEST_SIZE:10MB}

mybatis:
  configuration:
    map-underscore-to-camel-case: true

weather:
  seniverse:
    uid: ${WEATHER_UID:}
    key: ${WEATHER_KEY:}
    sign-enabled: false

# GitHub API 配置
github:
  # 由于 JDK 信任库可能缺少 GitHub 证书链，内网/本地开发可跳过 SSL 校验
  disable-ssl-verification: true
  # 全局 GitHub Token（降级/回退用，用户可在个人资料中绑定自己的 token）
  token: ${GITHUB_TOKEN:}
  # AES-256 加密密钥（Base64 编码，32 字节），用于加密用户 GitHub Token
  # 首次部署时运行 AesEncryptionUtil.generateKey() 生成，重启后切勿修改否则所有已存 token 无法解密
  token-encryption-key: ${GITHUB_TOKEN_ENCRYPTION_KEY:}

tencent:
  cos:
    secret-id: ${COS_SECRET_ID:}
    secret-key: ${COS_SECRET_KEY:}
    region: ${COS_REGION:ap-guangzhou}
    bucket-name: ${COS_BUCKET_NAME:}
    base-url: ${COS_BASE_URL:}
    folder: ${COS_IMAGE_FOLDER:blog/images}

# 有关发信邮箱请使用环境变量注入
# MAIL_USERNAME=yourname@163.com
# MAIL_PASSWORD=你的授权码