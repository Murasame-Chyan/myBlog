server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: myBlog

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/myblog}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  servlet:
    multipart:
      enabled: true
      max-file-size: ${MULTIPART_MAX_FILE_SIZE:10MB}
      max-request-size: ${MULTIPART_MAX_REQUEST_SIZE:10MB}

mybatis:
  configuration:
    map-underscore-to-camel-case: true

weather:
  seniverse:
    uid: ${WEATHER_UID:}
    key: ${WEATHER_KEY:}
    sign-enabled: false

github:
  token: ${GITHUB_TOKEN:}

tencent:
  cos:
    secret-id: ${COS_SECRET_ID:}
    secret-key: ${COS_SECRET_KEY:}
    region: ${COS_REGION:ap-guangzhou}
    bucket-name: ${COS_BUCKET_NAME:}
    base-url: ${COS_BASE_URL:}
    folder: ${COS_IMAGE_FOLDER:blog/images}
